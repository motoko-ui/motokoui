name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump (current = use package.json as-is)
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - current

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve version
        id: version
        run: |
          eval "$(node scripts/bump-version.mjs "${{ inputs.bump }}")"
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release $TAG"

      - name: Commit version bump
        run: |
          git add package.json apps/www/package.json
          if git diff --cached --quiet; then
            echo "package.json already at ${{ steps.version.outputs.version }}"
          else
            git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          fi

      - name: Create tag and push
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --verify-tag
